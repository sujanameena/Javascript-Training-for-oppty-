<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitwise NOT</title>
</head>

<body>

 <script>
  let user = {
    profile: {
      nickname: "Sujju"
    }
  };

  let displayName = user.profile?.nickname ?? "Guest";
  console.log("Display Name:", displayName); // "Sujju"

  let user2 = {};
  let displayName2 = user2.profile?.nickname ?? "Guest";
  console.log("Display Name 2:", displayName2); // "Guest"
</script>

</body>

</html>

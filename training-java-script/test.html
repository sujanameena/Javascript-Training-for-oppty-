<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitwise NOT</title>
</head>

<body>

 <script>
  function Person(name) {
    this.name = name;
  }

  let p = new Person("Aman");
  let arr = [1, 2, 3];
  let date = new Date();

  console.log("p instanceof Person:", p instanceof Person); // true
  console.log("arr instanceof Array:", arr instanceof Array); // true
  console.log("arr instanceof Object:", arr instanceof Object); // true
  console.log("date instanceof Date:", date instanceof Date); // true
  console.log("date instanceof Array:", date instanceof Array); // false
  console.log("date instanceof number:", p instanceof Number);
  console.log("date instanceof string:", arr instanceof String);
</script>

</body>

</html>

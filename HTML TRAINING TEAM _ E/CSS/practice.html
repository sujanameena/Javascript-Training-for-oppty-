<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<nav class="navbar">
  <div class="logo">MySite</div>
  <input type="checkbox" id="menu-toggle" class="menu-toggle" />
  <label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </label>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<style>
/* Basic styles */
.navbar {
  display: flex;
  align-items: center;
  background: #60a5fa;
  padding: 10px 20px;
  position: relative;
}
.logo {
  color: white;
  font-size: 1.5em;
  font-weight: bold;
  flex: 1;
}
.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
}
.nav-links li a {
  color: white;
  text-decoration: none;
  font-size: 1.1em;
}

/* Hamburger styles */
.menu-toggle {
  display: none;
}
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  width: 30px;
  height: 25px;
  justify-content: space-between;
}
.hamburger span {
  display: block;
  height: 4px;
  background: white;
  border-radius: 2px;
}

/* Media query for mobile */
@media (max-width: 600px) {
  .nav-links {
    display: none;
    flex-direction: column;
    background: #60a5fa;
    position: absolute;
    top: 50px;
    left: 0;
    width: 100%;
    padding: 0;
  }
  .nav-links li {
    text-align: center;
    padding: 15px 0;
    border-bottom: 1px solid #fff3;
  }
  .menu-toggle:checked + .hamburger + .nav-links {
    display: flex;
  }
  .hamburger {
    display: flex;
  }
}
</style>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Visual Studio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --bg-dark: #020617;
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-500: #64748b;
            --slate-400: #94a3b8;
            --sky-500: #0ea5e9;
            --sky-400: #38bdf8;
            --white: #f8fafc;
            --glass: rgba(15, 23, 42, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            body { flex-direction: row; }
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none !important; }

        aside {
            width: 100%;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border-bottom: 1px solid var(--slate-800);
        }

        @media (min-width: 768px) {
            aside {
                width: 320px;
                border-bottom: none;
                border-right: 1px solid var(--slate-800);
                height: 100vh;
            }
        }

        .logo h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.05em; }
        .logo .accent { color: var(--sky-500); }
        .version-tag { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }

        .gallery-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .gallery-title { font-size: 11px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; margin-bottom: 1rem; }

        #historyGrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .img-card {
            aspect-ratio: 1 / 1;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid var(--slate-800);
            cursor: pointer;
            background: var(--slate-900);
            transition: all 0.3s ease;
        }

        .img-card:hover { transform: translateY(-4px); border-color: var(--sky-400); }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }

        main {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
        }

        #imageWrapper {
            width: 100%;
            max-width: 512px;
            aspect-ratio: 1 / 1;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--slate-700);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #placeholder { text-align: center; padding: 2rem; }
        .sparkle-icon { width: 64px; height: 64px; background: var(--slate-800); border-radius: 1rem; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 50;
        }

        .spinner { width: 48px; height: 48px; border: 4px solid var(--sky-500); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .input-panel { width: 100%; max-width: 640px; padding: 1rem; border-radius: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        textarea { width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--slate-700); border-radius: 0.75rem; padding: 1rem; color: white; font-size: 0.875rem; outline: none; resize: none; }
        textarea:focus { border-color: var(--sky-500); }

        #genBtn {
            padding: 0.75rem 2rem;
            background: var(--sky-500);
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #genBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            z-index: 100;
        }
    </style>
</head>
<body>

    <aside class="glass">
        <div class="logo">
            <h1><span class="accent">AI</span> Studio</h1>
            <p class="version-tag">Imagen 4.0 Engine</p>
        </div>
        <div class="gallery-section">
            <h3 class="gallery-title">Your Gallery</h3>
            <div id="historyGrid">
                <p id="emptyMsg" style="font-size: 10px; color: var(--slate-600); font-style: italic;">No images yet...</p>
            </div>
        </div>
    </aside>

    <main>
        <div id="imageWrapper" class="glass">
            <div id="placeholder">
                <div class="sparkle-icon">✨</div>
                <p style="color: var(--slate-400)">Ready to visualize</p>
            </div>
            <img id="generatedImage" class="hidden" alt="Generated">
            <div id="loadingOverlay" class="hidden">
                <div class="spinner"></div>
                <p style="color: var(--sky-400); font-weight: 700;">Generating...</p>
            </div>
        </div>

        <div class="input-panel glass">
            <textarea id="promptInput" rows="2" placeholder="Describe your image..."></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 10px; color: var(--slate-500)">Imagen-4.0-Generate</span>
                <button id="genBtn" onclick="generateImage()">Generate</button>
            </div>
        </div>
    </main>

    <script>
        // API Key should be called from a backend service, not exposed in client code
        
        async function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) return showToast("Enter a prompt", true);

            const overlay = document.getElementById('loadingOverlay');
            const btn = document.getElementById('genBtn');
            
            overlay.classList.remove('hidden');
            btn.disabled = true;

            try {
                // Call your backend API instead of directly calling Google API
                const url = `/api/generate-image`;
                
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1 }
                    })
                });

                const data = await response.json();
                
                if (data.predictions && data.predictions[0]?.bytesBase64Encoded) {
                    const b64 = data.predictions[0].bytesBase64Encoded;
                    const url = `data:image/png;base64,${b64}`;
                    displayResult(url, prompt);
                } else {
                    throw new Error("Invalid response format");
                }
            } catch (err) {
                console.error(err);
                showToast("Generation failed. Check API limits.", true);
            } finally {
                overlay.classList.add('hidden');
                btn.disabled = false;
            }
        }

        async function fetchWithRetry(url, options) {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                const res = await fetch(url, options);
                if (res.ok) return res;
                if (res.status !== 429) return res; // If not rate limited, return anyway to show error
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
            throw new Error("Retry limit reached");
        }

        function displayResult(url, prompt) {
            document.getElementById('placeholder').classList.add('hidden');
            const img = document.getElementById('generatedImage');
            img.src = url;
            img.classList.remove('hidden');
            document.getElementById('imageWrapper').style.borderStyle = 'solid';

            // Add to history
            document.getElementById('emptyMsg')?.remove();
            const card = document.createElement('div');
            card.className = 'img-card';
            card.onclick = () => { img.src = url; };
            const thumb = document.createElement('img');
            thumb.src = url;
            card.appendChild(thumb);
            document.getElementById('historyGrid').prepend(card);
        }

        function showToast(msg, isErr) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = isErr ? '#ef4444' : '#0ea5e9';
            t.style.color = 'white';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>

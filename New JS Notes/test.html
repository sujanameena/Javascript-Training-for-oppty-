<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="spinner"></div>

    <style>
        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgb(242, 239, 244);
            border-top-color: rgb(109, 180, 215);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
